name: Android CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"

jobs:
  ci:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Verify build tool versions
        run: |
          java -version
          ./gradlew --version

      - name: Run checks and build debug APK
        shell: bash
        run: |
          set -o pipefail
          build_log="$RUNNER_TEMP/gradle-checks.log"
          if ./gradlew --no-daemon --stacktrace \
            lintDebug testDebugUnitTest assembleDebug 2>&1 | tee "$build_log"; then
            exit 0
          fi

          grep -Ei '^(e: |FAILURE:|\* What went wrong:|Execution failed for task|> )|manifest merger failed|uses-sdk:minSdkVersion|Suggestion:' \
            "$build_log" | tail -n 40 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SafeBaiyun-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Upload check reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SafeBaiyun-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            app/build/reports/
            app/build/outputs/logs/
            ${{ runner.temp }}/gradle-checks.log
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish signed release APK
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Prepare release signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for variable in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!variable}" ]; then
              echo "::error::Missing required GitHub secret: $variable"
              missing=1
            fi
          done
          test "$missing" -eq 0

          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" \
            | base64 --decode > "$RUNNER_TEMP/safebaiyun-source.keystore"
          test -s "$RUNNER_TEMP/safebaiyun-source.keystore"

      - name: Normalize release keystore
        shell: bash
        env:
          SOURCE_KEYSTORE_PATH: ${{ runner.temp }}/safebaiyun-source.keystore
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/safebaiyun-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          normalize_keystore() {
            keytool -importkeystore \
              -srckeystore "$SOURCE_KEYSTORE_PATH" \
              -srcstorepass "$ANDROID_KEYSTORE_PASSWORD" \
              -srcalias "$ANDROID_KEY_ALIAS" \
              -srckeypass "$1" \
              -destkeystore "$ANDROID_KEYSTORE_PATH" \
              -deststoretype PKCS12 \
              -deststorepass "$ANDROID_KEYSTORE_PASSWORD" \
              -destkeypass "$ANDROID_KEYSTORE_PASSWORD" \
              -destalias "$ANDROID_KEY_ALIAS" \
              -noprompt
          }

          if normalize_keystore "$ANDROID_KEY_PASSWORD"; then
            exit 0
          fi

          rm -f "$ANDROID_KEYSTORE_PATH"
          if [ "$ANDROID_KEY_PASSWORD" != "$ANDROID_KEYSTORE_PASSWORD" ] \
            && normalize_keystore "$ANDROID_KEYSTORE_PASSWORD"; then
            echo "::warning::The key uses the keystore password; ANDROID_KEY_PASSWORD was ignored"
            exit 0
          fi

          echo "::error::Unable to import the signing key; check the keystore, alias, and passwords"
          exit 1

      - name: Build signed release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/safebaiyun-release.p12
          ANDROID_KEYSTORE_TYPE: PKCS12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -o pipefail
          build_log="$RUNNER_TEMP/gradle-release.log"
          if ./gradlew --no-daemon --stacktrace \
            validateSigningRelease assembleRelease 2>&1 | tee "$build_log"; then
            exit 0
          fi

          grep -Ei '^(e: |FAILURE:|\* What went wrong:|Execution failed for task|> )|keystore|password|alias|signing|missing class|r8' \
            "$build_log" | tail -n 30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Upload release build log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SafeBaiyun-release-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/gradle-release.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify release APK signature
        shell: bash
        run: |
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$sdk_root"
          apksigner="$(find "$sdk_root/build-tools" -type f -name apksigner \
            | sort -V | tail -n 1)"
          test -n "$apksigner"
          "$apksigner" verify --verbose --print-certs "$signed_apk"

      - name: Upload signed release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SafeBaiyun-signed-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          source_apk="app/build/outputs/apk/release/app-release.apk"
          safe_tag="${GITHUB_REF_NAME//\//-}"
          output_apk="SafeBaiyun-${safe_tag}-signed.apk"
          test -f "$source_apk"
          cp "$source_apk" "$output_apk"
          echo "path=$output_apk" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_APK: ${{ steps.asset.outputs.path }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_APK#Signed APK" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_APK#Signed APK" \
              --verify-tag \
              --generate-notes \
              --title "SafeBaiyun $RELEASE_TAG"
          fi
